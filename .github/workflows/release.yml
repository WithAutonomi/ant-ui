name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      ant_version:
        description: "ant-client release tag to bundle (e.g. ant-cli-v0.1.2-rc.17). Leave empty to read .ant-version file."
        required: false

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  release-meta:
    name: determine release type
    runs-on: ubuntu-latest
    outputs:
      prerelease: ${{ steps.meta.outputs.prerelease }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - name: parse tag
        id: meta
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          version="${tag#v}"
          echo "version=${version}" >> $GITHUB_OUTPUT
          if [[ "$version" == *"-rc."* ]] || [[ "$version" == *"-beta."* ]] || [[ "$version" == *"-alpha."* ]]; then
            echo "prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi
          echo "Tag: $tag"
          echo "Version: $version"
          echo "Prerelease: $(grep prerelease $GITHUB_OUTPUT | cut -d= -f2)"

  resolve-ant-version:
    name: resolve ant sidecar version
    runs-on: ubuntu-latest
    outputs:
      ant_tag: ${{ steps.resolve.outputs.ant_tag }}
      ant_version: ${{ steps.resolve.outputs.ant_version }}
    steps:
      - uses: actions/checkout@v4

      - name: resolve version
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Priority: workflow_dispatch input > .ant-version file > latest
          INPUT="${{ github.event.inputs.ant_version }}"

          if [ -n "$INPUT" ]; then
            TAG="$INPUT"
            echo "Source: workflow_dispatch input"
          elif [ -f .ant-version ]; then
            TAG=$(cat .ant-version | tr -d '[:space:]')
            echo "Source: .ant-version file"
          else
            TAG="latest"
            echo "Source: default (latest)"
          fi

          if [ "$TAG" = "latest" ]; then
            TAG=$(gh release list --repo WithAutonomi/ant-client --limit 1 --json tagName --jq '.[0].tagName')
            echo "Resolved 'latest' to: $TAG"
          fi

          # Extract version number (strip ant-cli-v prefix)
          VERSION="${TAG#ant-cli-v}"

          echo "ant_tag=$TAG" >> $GITHUB_OUTPUT
          echo "ant_version=$VERSION" >> $GITHUB_OUTPUT
          echo "Using ant sidecar: $TAG (version: $VERSION)"

  create-release:
    name: create draft release
    runs-on: ubuntu-latest
    needs: [release-meta]
    outputs:
      release_id: ${{ steps.create.outputs.release_id }}
    steps:
      - name: create draft release
        id: create
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="v${{ needs.release-meta.outputs.version }}"

          # `gh release create` (as opposed to raw `gh api`) attaches the pushed
          # git tag to the release object from creation, so downstream jobs and
          # the final latest.json see the proper tag name instead of GitHub's
          # internal `untagged-<id>` placeholder.
          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" &>/dev/null; then
            echo "Release $tag already exists (re-run)"
          else
            prerelease_flag=""
            if [ "${{ needs.release-meta.outputs.prerelease }}" = "true" ]; then
              prerelease_flag="--prerelease"
            fi

            gh release create "$tag" \
              --repo "$GITHUB_REPOSITORY" \
              --draft \
              --title "Autonomi v${{ needs.release-meta.outputs.version }}" \
              --generate-notes \
              $prerelease_flag

            echo "Created draft release $tag"
          fi

          # Tag-attached assertion: fails fast if GitHub still reports the
          # release under an `untagged-*` slug. Without this, Windows MSI
          # upload (which runs earliest) would freeze that slug into the
          # final latest.json URL.
          attached_tag=$(gh release view "$tag" --repo "$GITHUB_REPOSITORY" --json tagName -q .tagName)
          if [ "$attached_tag" != "$tag" ]; then
            echo "ERROR: draft release tag is '$attached_tag', expected '$tag'" >&2
            exit 1
          fi
          echo "Tag $tag confirmed attached to draft release"

          release_id=$(gh api "repos/$GITHUB_REPOSITORY/releases" \
            --jq ".[] | select(.tag_name == \"$tag\") | .id")
          echo "release_id=$release_id" >> $GITHUB_OUTPUT

  build-linux-macos:
    name: build (${{ matrix.args && matrix.args || matrix.platform }})
    runs-on: ${{ matrix.platform }}
    needs: [release-meta, create-release, resolve-ant-version]
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: ""
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: install linux dependencies
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: generate macOS icon from iconset
        if: matrix.platform == 'macos-latest'
        run: |
          iconutil -c icns src-tauri/icons/autonomi.iconset -o src-tauri/icons/icon.icns

      - run: npm install

      - name: download ant daemon sidecar
        env:
          ANT_VERSION: ${{ needs.resolve-ant-version.outputs.ant_version }}
          ANT_TAG: ${{ needs.resolve-ant-version.outputs.ant_tag }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Determine Tauri target triple
          CROSS_TARGET=$(echo "${{ matrix.args }}" | sed -n 's/.*--target \([^ ]*\).*/\1/p')
          if [ -z "$CROSS_TARGET" ]; then
            CROSS_TARGET=$(rustc -vV | grep host | awk '{print $2}')
          fi

          # ant-client publishes musl builds for Linux
          ANT_TARGET="${CROSS_TARGET/unknown-linux-gnu/unknown-linux-musl}"

          ASSET="ant-${ANT_VERSION}-${ANT_TARGET}.tar.gz"
          echo "Downloading $ASSET from $ANT_TAG"

          mkdir -p src-tauri/binaries
          gh release download "$ANT_TAG" \
            --repo WithAutonomi/ant-client \
            --pattern "$ASSET" \
            --dir /tmp

          tar xzf "/tmp/$ASSET" -C /tmp
          cp "/tmp/ant-${ANT_VERSION}-${ANT_TARGET}/ant" "src-tauri/binaries/ant-${CROSS_TARGET}"
          chmod +x "src-tauri/binaries/ant-${CROSS_TARGET}"
          echo "Sidecar ready: src-tauri/binaries/ant-${CROSS_TARGET}"

          # Bundle the bootstrap_peers.toml that ships with this daemon version
          # so the GUI's embedded ant-core client can connect on a fresh install.
          mkdir -p src-tauri/resources
          cp "/tmp/ant-${ANT_VERSION}-${ANT_TARGET}/bootstrap_peers.toml" \
             "src-tauri/resources/bootstrap_peers.toml"
          echo "Bootstrap peers refreshed from $ANT_TAG"

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS code signing
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # macOS notarization
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          # Pass the concrete tag (not the literal `v__VERSION__` template) so
          # asset URLs tauri-action stamps into any artifact metadata are
          # correct. latest.json is composed from scratch in the final job, so
          # includeUpdaterJson is disabled here to avoid parallel writes.
          tagName: v${{ needs.release-meta.outputs.version }}
          releaseName: "Autonomi v${{ needs.release-meta.outputs.version }}"
          releaseDraft: true
          prerelease: ${{ needs.release-meta.outputs.prerelease == 'true' }}
          includeUpdaterJson: false
          args: ${{ matrix.args }}

  build-windows:
    name: build windows MSI (signed)
    runs-on: windows-latest
    needs: [release-meta, create-release, resolve-ant-version]
    env:
      SM_HOST: ${{ secrets.SM_HOST }}
      SM_API_KEY: ${{ secrets.SM_API_KEY }}
      SM_CLIENT_CERT_PASSWORD: ${{ secrets.SM_CLIENT_CERT_PASSWORD }}
      SM_KEYPAIR_ALIAS: ${{ secrets.SM_KEYPAIR_ALIAS }}
      SM_LOG_LEVEL: trace
      SM_LOG_FILE: ${{ github.workspace }}\smctl-signing.log
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - run: npm install

      - name: download ant daemon sidecar
        env:
          ANT_VERSION: ${{ needs.resolve-ant-version.outputs.ant_version }}
          ANT_TAG: ${{ needs.resolve-ant-version.outputs.ant_tag }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TARGET="x86_64-pc-windows-msvc"
          ASSET="ant-${ANT_VERSION}-${TARGET}.zip"
          echo "Downloading $ASSET from $ANT_TAG"

          mkdir -p src-tauri/binaries
          gh release download "$ANT_TAG" \
            --repo WithAutonomi/ant-client \
            --pattern "$ASSET" \
            --dir "$RUNNER_TEMP"

          cd "$RUNNER_TEMP" && unzip -o "$ASSET"
          cp "$RUNNER_TEMP/ant-${ANT_VERSION}-${TARGET}/ant.exe" \
            "$GITHUB_WORKSPACE/src-tauri/binaries/ant-${TARGET}.exe"
          echo "Sidecar ready: src-tauri/binaries/ant-${TARGET}.exe"

          # Bundle the bootstrap_peers.toml that ships with this daemon version
          # so the GUI's embedded ant-core client can connect on a fresh install.
          mkdir -p "$GITHUB_WORKSPACE/src-tauri/resources"
          cp "$RUNNER_TEMP/ant-${ANT_VERSION}-${TARGET}/bootstrap_peers.toml" \
            "$GITHUB_WORKSPACE/src-tauri/resources/bootstrap_peers.toml"
          echo "Bootstrap peers refreshed from $ANT_TAG"

      - name: create client certificate file
        id: prepare_cert
        shell: pwsh
        run: |
          $raw = @'
          ${{ secrets.SM_CLIENT_CERT_B64 }}
          '@

          $clean = ($raw -replace '\s','')

          if ([string]::IsNullOrWhiteSpace($clean)) {
            Write-Error "SM_CLIENT_CERT_B64 is empty after normalization."
            exit 1
          }

          try {
            $certBytes = [Convert]::FromBase64String($clean)
          } catch {
            Write-Error "SM_CLIENT_CERT_B64 is not valid Base64."
            exit 1
          }

          $certPath = Join-Path $env:RUNNER_TEMP "Certificate.p12"
          [System.IO.File]::WriteAllBytes($certPath, $certBytes)

          "SM_CLIENT_CERT_FILE=$certPath" | Out-File -FilePath $env:GITHUB_ENV -Append
          "sm_client_cert_b64=$clean" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: setup DigiCert SSM tools
        uses: digicert/ssm-code-signing@v1.2.1
        with:
          sm_host: ${{ secrets.SM_HOST }}
          sm_api_key: ${{ secrets.SM_API_KEY }}
          sm_client_cert_b64: ${{ steps.prepare_cert.outputs.sm_client_cert_b64 }}
          sm_client_cert_password: ${{ secrets.SM_CLIENT_CERT_PASSWORD }}

      - name: verify smctl installation
        shell: pwsh
        run: |
          smctl -v
          smctl healthcheck

      - name: create signing script
        shell: pwsh
        run: |
          # Create a batch script for Tauri's signCommand hook.
          # "%~1" strips any surrounding quotes then re-quotes, safe for paths with spaces.
          $script = @"
          @echo off
          smctl sign --keypair-alias "$env:SM_KEYPAIR_ALIAS" --input "%~1"
          if %ERRORLEVEL% neq 0 exit /b 1
          "@
          Set-Content -Path "sign.cmd" -Value $script

      - name: build and bundle MSI
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        shell: pwsh
        run: |
          $signCmd = (Resolve-Path "sign.cmd").Path -replace '\\', '/'

          # Windows MSI versioning rejects non-numeric pre-release identifiers
          # (e.g. `0.6.5-rc.1`), because the MSI format inherits the 4-part
          # numeric PE resource version. Tauri errors with: "optional pre-release
          # identifier in app version must be numeric-only". Override wix.version
          # with just the `major.minor.patch` portion so `rc.N` / `beta.N` tags
          # can still ship an MSI. The app's self-reported version (CARGO_PKG_VERSION
          # / tauri.conf.json) keeps the full semver — the override only affects
          # MSI metadata (what Windows' Add/Remove Programs displays).
          $conf = Get-Content src-tauri\tauri.conf.json | ConvertFrom-Json
          $msiVersion = ($conf.version -split '-')[0]
          Write-Host "MSI wix.version override: $msiVersion (from tauri.conf.json '$($conf.version)')"

          $overrideJson = @{
            bundle = @{
              windows = @{
                signCommand = "$signCmd %1"
                wix = @{
                  version = $msiVersion
                }
              }
            }
          } | ConvertTo-Json -Depth 5 -Compress

          # Tauri replaces %1 in signCommand with the file path, then executes
          # the result as a shell command. sign.cmd receives that path as its
          # first arg (%1).
          npx tauri build --bundles msi,updater --config $overrideJson
          Remove-Item -Path "sign.cmd" -ErrorAction SilentlyContinue

      - name: verify MSI signature
        shell: pwsh
        run: |
          $msi = Get-ChildItem "src-tauri\target\release\bundle\msi\*.msi" | Select-Object -First 1
          $sig = Get-AuthenticodeSignature $msi.FullName
          Write-Host "MSI: $($msi.Name)"
          Write-Host "Status: $($sig.Status)"
          Write-Host "Signer: $($sig.SignerCertificate.Subject)"
          if ($sig.Status -ne "Valid") {
            Write-Error "MSI Authenticode signature validation failed"
            exit 1
          }

      - name: upload MSI to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          tag="${GITHUB_REF#refs/tags/}"

          # Upload MSI installer and updater signature
          # In Tauri v2, the .msi is the updater artifact directly (no .msi.zip)
          gh release upload "$tag" \
            src-tauri/target/release/bundle/msi/*.msi \
            src-tauri/target/release/bundle/msi/*.msi.sig \
            --clobber

      - name: upload signing logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: signing-logs
          path: ${{ github.workspace }}\smctl-signing.log
          if-no-files-found: ignore

  compose-latest-json:
    name: compose and upload latest.json
    runs-on: ubuntu-latest
    needs: [release-meta, build-linux-macos, build-windows]
    steps:
      - name: download all signature files
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="v${{ needs.release-meta.outputs.version }}"
          mkdir -p sigs
          gh release download "$tag" --pattern "*.sig" --dir sigs --clobber --repo "$GITHUB_REPOSITORY"
          echo "Downloaded signatures:"
          ls -l sigs

      - name: compose latest.json from scratch
        env:
          VERSION: ${{ needs.release-meta.outputs.version }}
        run: |
          tag="v${VERSION}"
          base="https://github.com/${GITHUB_REPOSITORY}/releases/download/${tag}"

          read_sig() {
            local path="sigs/$1"
            if [ ! -s "$path" ]; then
              echo "ERROR: signature file missing or empty: $path" >&2
              ls -l sigs >&2
              exit 1
            fi
            cat "$path"
          }

          mac_x64_sig=$(read_sig "Autonomi_x64.app.tar.gz.sig")
          mac_aarch64_sig=$(read_sig "Autonomi_aarch64.app.tar.gz.sig")
          linux_appimage_sig=$(read_sig "Autonomi_${VERSION}_amd64.AppImage.sig")
          linux_deb_sig=$(read_sig "Autonomi_${VERSION}_amd64.deb.sig")
          linux_rpm_sig=$(read_sig "Autonomi-${VERSION}-1.x86_64.rpm.sig")
          win_sig=$(read_sig "Autonomi_${VERSION}_x64_en-US.msi.sig")

          pub_date=$(date -u +"%Y-%m-%dT%H:%M:%S.000Z")

          jq -n \
            --arg version       "${VERSION}" \
            --arg pub_date      "${pub_date}" \
            --arg mac_x64_url   "${base}/Autonomi_x64.app.tar.gz" \
            --arg mac_arm_url   "${base}/Autonomi_aarch64.app.tar.gz" \
            --arg lx_app_url    "${base}/Autonomi_${VERSION}_amd64.AppImage" \
            --arg lx_deb_url    "${base}/Autonomi_${VERSION}_amd64.deb" \
            --arg lx_rpm_url    "${base}/Autonomi-${VERSION}-1.x86_64.rpm" \
            --arg win_url       "${base}/Autonomi_${VERSION}_x64_en-US.msi" \
            --arg mac_x64_sig   "${mac_x64_sig}" \
            --arg mac_arm_sig   "${mac_aarch64_sig}" \
            --arg lx_app_sig    "${linux_appimage_sig}" \
            --arg lx_deb_sig    "${linux_deb_sig}" \
            --arg lx_rpm_sig    "${linux_rpm_sig}" \
            --arg win_sig       "${win_sig}" \
            '{
              version: $version,
              notes: "",
              pub_date: $pub_date,
              platforms: {
                "darwin-x86_64":         {signature: $mac_x64_sig, url: $mac_x64_url},
                "darwin-x86_64-app":     {signature: $mac_x64_sig, url: $mac_x64_url},
                "darwin-aarch64":        {signature: $mac_arm_sig, url: $mac_arm_url},
                "darwin-aarch64-app":    {signature: $mac_arm_sig, url: $mac_arm_url},
                "linux-x86_64":          {signature: $lx_app_sig,  url: $lx_app_url},
                "linux-x86_64-appimage": {signature: $lx_app_sig,  url: $lx_app_url},
                "linux-x86_64-deb":      {signature: $lx_deb_sig,  url: $lx_deb_url},
                "linux-x86_64-rpm":      {signature: $lx_rpm_sig,  url: $lx_rpm_url},
                "windows-x86_64":        {signature: $win_sig,     url: $win_url}
              }
            }' > latest.json

          echo "--- composed latest.json ---"
          jq . latest.json

      - name: assert latest.json integrity
        run: |
          # Fails if any URL still contains GitHub's `untagged-*` draft slug or
          # tauri-action's unsubstituted `__VERSION__` template. Also guards
          # against empty/null signatures.
          if jq -e '.platforms | to_entries[] | select(.value.url | test("__VERSION__|/releases/download/untagged-"))' latest.json > /dev/null; then
            echo "ERROR: latest.json contains broken URLs (__VERSION__ or untagged-*)" >&2
            jq '.platforms' latest.json >&2
            exit 1
          fi
          if jq -e '.platforms | to_entries[] | select(.value.signature == "" or .value.signature == null)' latest.json > /dev/null; then
            echo "ERROR: latest.json contains empty signatures" >&2
            jq '.platforms' latest.json >&2
            exit 1
          fi
          expected_platforms='["darwin-aarch64","darwin-aarch64-app","darwin-x86_64","darwin-x86_64-app","linux-x86_64","linux-x86_64-appimage","linux-x86_64-deb","linux-x86_64-rpm","windows-x86_64"]'
          actual_platforms=$(jq -c '.platforms | keys' latest.json)
          if [ "$actual_platforms" != "$expected_platforms" ]; then
            echo "ERROR: latest.json platforms mismatch" >&2
            echo "expected: $expected_platforms" >&2
            echo "actual:   $actual_platforms" >&2
            exit 1
          fi
          echo "latest.json passed integrity checks"

      - name: upload latest.json to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="v${{ needs.release-meta.outputs.version }}"
          gh release upload "$tag" latest.json --clobber --repo "$GITHUB_REPOSITORY"
