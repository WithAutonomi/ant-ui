name: release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  release-meta:
    name: determine release type
    runs-on: ubuntu-latest
    outputs:
      prerelease: ${{ steps.meta.outputs.prerelease }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - name: parse tag
        id: meta
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          version="${tag#v}"
          echo "version=${version}" >> $GITHUB_OUTPUT
          if [[ "$version" == *"-rc."* ]] || [[ "$version" == *"-beta."* ]] || [[ "$version" == *"-alpha."* ]]; then
            echo "prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi
          echo "Tag: $tag"
          echo "Version: $version"
          echo "Prerelease: $(grep prerelease $GITHUB_OUTPUT | cut -d= -f2)"

  build-linux-macos:
    name: build (${{ matrix.args && matrix.args || matrix.platform }})
    runs-on: ${{ matrix.platform }}
    needs: [release-meta]
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: ""
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: install linux dependencies
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: generate macOS icon from iconset
        if: matrix.platform == 'macos-latest'
        run: |
          iconutil -c icns src-tauri/icons/autonomi.iconset -o src-tauri/icons/icon.icns

      - run: npm install

      - name: build ant daemon sidecar
        run: |
          git clone --depth 1 https://github.com/WithAutonomi/ant-client.git /tmp/ant-client
          cd /tmp/ant-client
          cargo build --release -p ant-cli
          mkdir -p ${{ github.workspace }}/src-tauri/binaries
          TARGET=$(rustc -vV | grep host | awk '{print $2}')
          if [ -n "${{ matrix.args }}" ]; then
            # Cross-compilation: extract target from --target flag
            CROSS_TARGET=$(echo "${{ matrix.args }}" | grep -oP '(?<=--target )\S+')
            if [ -n "$CROSS_TARGET" ]; then
              cargo build --release -p ant-cli --target "$CROSS_TARGET"
              cp "target/$CROSS_TARGET/release/ant" "${{ github.workspace }}/src-tauri/binaries/ant-${CROSS_TARGET}"
            else
              cp target/release/ant "${{ github.workspace }}/src-tauri/binaries/ant-${TARGET}"
            fi
          else
            cp target/release/ant "${{ github.workspace }}/src-tauri/binaries/ant-${TARGET}"
          fi

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS code signing
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # macOS notarization
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: v__VERSION__
          releaseName: "Autonomi v__VERSION__"
          releaseDraft: true
          prerelease: ${{ needs.release-meta.outputs.prerelease == 'true' }}
          generateReleaseNotes: true
          args: ${{ matrix.args }}

  build-windows:
    name: build windows MSI (signed)
    runs-on: windows-latest
    # Depends on build-linux-macos because tauri-action creates the draft release there.
    # Without this, gh release upload would fail if the release doesn't exist yet.
    needs: [release-meta, build-linux-macos]
    env:
      SM_HOST: ${{ secrets.SM_HOST }}
      SM_API_KEY: ${{ secrets.SM_API_KEY }}
      SM_CLIENT_CERT_PASSWORD: ${{ secrets.SM_CLIENT_CERT_PASSWORD }}
      SM_KEYPAIR_ALIAS: ${{ secrets.SM_KEYPAIR_ALIAS }}
      SM_LOG_LEVEL: trace
      SM_LOG_FILE: ${{ github.workspace }}\smctl-signing.log
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - run: npm install

      - name: build ant daemon sidecar
        shell: pwsh
        run: |
          git clone --depth 1 https://github.com/WithAutonomi/ant-client.git $env:RUNNER_TEMP\ant-client
          Push-Location $env:RUNNER_TEMP\ant-client
          cargo build --release -p ant-cli
          Pop-Location
          New-Item -ItemType Directory -Force -Path src-tauri\binaries
          Copy-Item $env:RUNNER_TEMP\ant-client\target\release\ant.exe src-tauri\binaries\ant-x86_64-pc-windows-msvc.exe

      - name: create client certificate file
        id: prepare_cert
        shell: pwsh
        run: |
          $raw = @'
          ${{ secrets.SM_CLIENT_CERT_B64 }}
          '@

          $clean = ($raw -replace '\s','')

          if ([string]::IsNullOrWhiteSpace($clean)) {
            Write-Error "SM_CLIENT_CERT_B64 is empty after normalization."
            exit 1
          }

          try {
            $certBytes = [Convert]::FromBase64String($clean)
          } catch {
            Write-Error "SM_CLIENT_CERT_B64 is not valid Base64."
            exit 1
          }

          $certPath = Join-Path $env:RUNNER_TEMP "Certificate.p12"
          [System.IO.File]::WriteAllBytes($certPath, $certBytes)

          "SM_CLIENT_CERT_FILE=$certPath" | Out-File -FilePath $env:GITHUB_ENV -Append
          "sm_client_cert_b64=$clean" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: setup DigiCert SSM tools
        uses: digicert/ssm-code-signing@v1.2.1
        with:
          sm_host: ${{ secrets.SM_HOST }}
          sm_api_key: ${{ secrets.SM_API_KEY }}
          sm_client_cert_b64: ${{ steps.prepare_cert.outputs.sm_client_cert_b64 }}
          sm_client_cert_password: ${{ secrets.SM_CLIENT_CERT_PASSWORD }}

      - name: verify smctl installation
        shell: pwsh
        run: |
          smctl -v
          smctl healthcheck

      - name: create signing script
        shell: pwsh
        run: |
          # Create a batch script for Tauri's signCommand hook.
          # "%~1" strips any surrounding quotes then re-quotes, safe for paths with spaces.
          $script = @"
          @echo off
          smctl sign --keypair-alias "$env:SM_KEYPAIR_ALIAS" --input "%~1"
          if %ERRORLEVEL% neq 0 exit /b 1
          "@
          Set-Content -Path "sign.cmd" -Value $script

      - name: build and bundle MSI
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        shell: pwsh
        run: |
          $signCmd = (Resolve-Path "sign.cmd").Path -replace '\\', '/'
          # Tauri replaces %1 in signCommand with the file path, then executes the
          # result as a shell command. sign.cmd receives that path as its first arg (%1).
          npx tauri build --bundles msi,updater --config "{`"bundle`":{`"windows`":{`"signCommand`":`"$signCmd %1`"}}}"
          Remove-Item -Path "sign.cmd" -ErrorAction SilentlyContinue

      - name: verify MSI signature
        shell: pwsh
        run: |
          $msi = Get-ChildItem "src-tauri\target\release\bundle\msi\*.msi" | Select-Object -First 1
          $sig = Get-AuthenticodeSignature $msi.FullName
          Write-Host "MSI: $($msi.Name)"
          Write-Host "Status: $($sig.Status)"
          Write-Host "Signer: $($sig.SignerCertificate.Subject)"
          if ($sig.Status -ne "Valid") {
            Write-Error "MSI Authenticode signature validation failed"
            exit 1
          }

      - name: upload MSI to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          tag="${GITHUB_REF#refs/tags/}"

          # Upload MSI installer and updater signature
          # In Tauri v2, the .msi is the updater artifact directly (no .msi.zip)
          gh release upload "$tag" \
            src-tauri/target/release/bundle/msi/*.msi \
            src-tauri/target/release/bundle/msi/*.msi.sig \
            --clobber

      - name: upload signing logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: signing-logs
          path: ${{ github.workspace }}\smctl-signing.log
          if-no-files-found: ignore

  update-latest-json:
    name: merge Windows into latest.json
    runs-on: ubuntu-latest
    needs: [build-windows, build-linux-macos, release-meta]
    steps:
      - name: download latest.json from release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="v${{ needs.release-meta.outputs.version }}"
          gh release download "$tag" --pattern "latest.json" --dir . --repo "$GITHUB_REPOSITORY"

      - name: get Windows updater artifact URL and signature
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="v${{ needs.release-meta.outputs.version }}"

          # In Tauri v2, the .msi is the updater artifact directly (no .msi.zip wrapper)
          # Use test() to match only .msi files (not .msi.sig or other .msi-containing names)
          msi_url=$(gh release view "$tag" --repo "$GITHUB_REPOSITORY" --json assets \
            --jq '.assets[] | select(.name | test("Autonomi.*\\.msi$")) | .url')

          # Download the .msi.sig and read its contents
          gh release download "$tag" --pattern "*.msi.sig" --dir . --repo "$GITHUB_REPOSITORY"
          sig_content=$(cat *.msi.sig)

          echo "MSI_URL=${msi_url}" >> $GITHUB_ENV
          echo "MSI_SIG=${sig_content}" >> $GITHUB_ENV

      - name: merge Windows entry into latest.json
        run: |
          # Add windows-x86_64 platform to latest.json
          jq --arg url "$MSI_URL" \
             --arg sig "$MSI_SIG" \
             '.platforms["windows-x86_64"] = {"signature": $sig, "url": $url}' \
             latest.json > latest-updated.json
          mv latest-updated.json latest.json
          echo "Updated latest.json:"
          cat latest.json | jq .

      - name: upload merged latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="v${{ needs.release-meta.outputs.version }}"
          gh release upload "$tag" latest.json --clobber --repo "$GITHUB_REPOSITORY"
